<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FFD700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        
        body {
            background: url('hand.jpg') no-repeat center  center fixed;
            background-size: cover;
            color: #000;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }


        /* Central Yellow Bank Icon */
       .logo-wrapper {
    margin-top: 50px;
    margin-bottom: 30px;
    display: flex;
    justify-content: center;
}

.bank-logo-img {
    width: 80px;  /* Adjust this size based on your pic */
    height: auto;
    border-radius: 50px; /* Optional: rounds the corners of your pic */
}


        h1 { font-size: 28px; margin-bottom: 5px; }
        .welcome-text { font-size: 16px; color: #002; margin-bottom: 20px; }

        /* DEMO MODE tag */
        .demo-tag {
            border: 1px solid #FFD700;
            color: #FFD700;
            border-radius: 20px;
            padding: 8px 20px;
            display: inline-block;
            margin-bottom: 40px;
            font-size: 14px;
        }

        /* Inputs and Labels */
        .input-group {
            text-align: center;
            margin-bottom: 25px;
        }

        label { color: #000; margin-bottom: 10px; display: block; }

        input {
            width: 80%;
            padding: 10px 20px;
            background: rgba(200, 200, 200, 0.6);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            box-sizing: border-box; /* Crucial for padding */
        }

        .login-card{height: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            margin-bottom: 5%;
            padding: 2%;
            
        }

        ::placeholder { color: #555; }

        /* Sign In Button */
        .signin-btn {
            width: 80%;
            padding: 10px;
            background: rgba(220, 220, 220, 0.4); /* Main Yellow */
            color: black;
            font-weight: bold;
            font-size: 18px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .signin-btn:hover { opacity: 0.8; }

        /* Bottom Signup Link */
        .signup-text { margin-top: 30px; color: #000; }
        .signup-link { color: #0f0; text-decoration: none; font-weight: bold; }

    </style>
</head>
<body>

    <div id="installBanner" style="display:none; background: #1a1a1a; border: 1px solid #FFD700; padding: 15px; border-radius: 15px; margin: 20px; text-align: center;">
    <p style="color: white; margin-bottom: 10px; font-size: 14px;">Install <b>Paragons App</b> for a better experience!</p>
    <button id="installBtn" style="background: #FFD700; color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer;">
        Install Now
    </button>
</div>


    <div class="login-container">

      <div class="logo-wrapper">
    <img src="logo.png" alt="SecureBank Logo" class="bank-logo-img">
</div>

<div class="login-card">

        <h1>Paragons-Saving</h1>
        <div class="welcome-text">Culture</div>

        <div class="demo-tag">ⓘ WELCOME</div>

        <div class="input-group">
            <label for="emailInput">Email</label>
            <input type="email" id="emailInput" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password" required>
        </div>

        <button class="signin-btn" id="signInBtn" onclick="signIn()">Sign In</button>

        <div class="signup-text">Wanna look around? <a href="#" class="signup-link">VISIT SITE</a></div>
    </div>
    </div>
<script>
   const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-fgY13F8CZBj9veCjCL_C7h0mWlq0w-e695w_DFP9RUy8F8T0yslKvwHUwjlrd43x/exec";

function signIn() {
    console.log("Login function started"); // Testing if the button works
    
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const btn = document.getElementById('signInBtn');

    if (!emailInput || !passwordInput || !btn) {
        alert("Check your HTML IDs: emailInput, passwordInput, or signInBtn is missing!");
        return;
    }

    if (!emailInput.value || !passwordInput.value) {
        alert("Please enter both email and password");
        return;
    }

    const email = emailInput.value.trim().toLowerCase();
    const password = passwordInput.value.trim();

    btn.innerText = "Verifying...";
    btn.disabled = true;

    const finalUrl = `${SCRIPT_URL}?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`;

   // Change your fetch block to this simplified version
fetch(finalUrl)
    .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
    })
    .then(data => {
        console.log("Success:", data);
        if (data.success) {
            localStorage.setItem('userData', JSON.stringify(data.latest));
            localStorage.setItem('allEntries', JSON.stringify(data.allEntries));
            window.location.href = "home.html";
        } else {
            alert(data.message || "Invalid credentials");
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("Connection blocked or failed. See console (F12).");
        btn.innerText = "Sign In";
        btn.disabled = false;
    });

}

 if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('PWA: Service Worker Registered'))
      .catch(err => console.log('PWA: Registration Failed', err));
  });
}

</script>


</body>
</html>
