<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParagonsSaving - profile</title>
    
    <style>body { background-color: #000; color: #fff; font-family: sans-serif; }

.account-card {
    background-color: #1a1a1a;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    align-items: center;
    margin-bottom: 12px;
    cursor: pointer;
    border: 1px solid #333;
}

.card-icon-bg {
    background-color: #262626;
    padding: 10px;
    border-radius: 10px;
    margin-right: 15px;
}

.yellow-icon { width: 24px; height: 24px; fill: #ffd700; }

.card-content { flex-grow: 1; }

.label { display: block; color: #888; font-size: 12px; margin-bottom: 4px; }

.value { font-size: 15px; font-weight: 500; }

.arrow-right { width: 20px; height: 20px; fill: #555; }

.section-title { margin: 20px 0 10px 5px; font-weight: bold; color: #fff; }

.password-container {
    padding: 20px;
    background: #000;
    min-height: 100vh;
    color: white;
    font-family: sans-serif;
}

.header { display: flex; align-items: center; margin-bottom: 30px; }
.back-btn { background: none; border: none; color: #FFD700; font-size: 24px; margin-right: 15px; }

.password-card {
    background: #111;
    padding: 25px;
    border-radius: 20px;
    border: 1px solid #222;
}

label { display: block; color: #888; font-size: 13px; margin-bottom: 8px; }

input {
    width: 100%;
    padding: 15px;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 12px;
    color: white;
    margin-bottom: 20px;
    box-sizing: border-box;
}

.save-btn {
    width: 100%;
    padding: 16px;
    background: #FFD700; /* Matching your gold theme */
    color: black;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
}


</style>
    </head>
    <body>
        <div class="section-title">Security</div>

<div class="account-card">
    <div class="card-icon-bg">
        <svg class="yellow-icon" viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 14h2v2h-2v-2zm0-8h2v6h-2V7z"/></svg>
    </div>
    <div class="card-content" onclick="openPasswordForm()">
        <span class="label">Password</span>
        <span class="value">Change Password</span>
    </div>
    <svg class="arrow-right" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
</div>

<div class="password-container">
    <div class="header">
        <button onclick="window.history.back()" class="back-btn">←</button>
        <h2>Update Security</h2>
    </div>

    <div class="password-card">
        <label>New Password</label>
        <input type="password" id="newPass" placeholder="Enter at least 4 characters">
        
        <label>Confirm Password</label>
        <input type="password" id="confirmPass" placeholder="Repeat new password">
        
        <button onclick="submitPasswordChange()" class="save-btn">Update Password</button>
    </div>
</div>




<script>
   
function submitPasswordChange() {
    const newPass = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const userData = JSON.parse(localStorage.getItem('userData'));
    
    // 1. Validations
    if (newPass !== confirmPass) {
        return alert("Passwords do not match!");
    }
    if (newPass.length < 4) {
        return alert("Password must be at least 4 characters.");
    }

    const btn = document.querySelector('.save-btn');
    btn.innerText = "Processing...";
    btn.disabled = true;

    // 2. The Fetch (Talks to your Google Sheet)
    fetch("https://script.google.com/macros/s/AKfycbx-fgY13F8CZBj9veCjCL_C7h0mWlq0w-e695w_DFP9RUy8F8T0yslKvwHUwjlrd43x/exec", {
        method: 'POST',
        mode: 'no-cors', // Essential for Google Apps Script POST
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            email: userData.EMAIL || userData.Email,
            newPassword: newPass
        })
    })
    .then(() => {
        alert("Success! Please log in with your new password.");
        localStorage.clear(); // Security: log them out after change
        window.location.href = "index.html";
    })
    .catch(err => {
        alert("Error connecting to server.");
        btn.innerText = "Update Password";
        btn.disabled = false;
    });
}

</script>
    </body>
</html>
